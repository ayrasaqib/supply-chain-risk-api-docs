openapi: 3.0.4
info:
  title: Supply Chain Risk API
  description: |
    OpenAPI contract for the weather ingestion, retrieval, processing, and risk analytics endpoints exposed through API Gateway and backed by AWS Lambda.
  version: 1.0.0
servers:
- url: https://virtserver.swaggerhub.com/seng3011-d31/Supply-Chain-Risk-API-spec/1.0.0
  description: SwaggerHub API Auto Mocking
- url: "https://{apiId}.execute-api.{region}.amazonaws.com/{stage}"
  description: AWS API Gateway deployment
  variables:
    apiId:
      default: 8j2uou6h19
    region:
      default: us-east-1
    stage:
      default: dev
tags:
- name: Data collection microservice
- name: Data retrieval microservice
- name: Data processing microservice
- name: Analytics microservice
paths:
  /ese/v1/ingest/weather/{hub_id}:
    post:
      tags:
      - Data collection microservice
      summary: Ingest weather forecast for a hub
      description: |
        Resolves latitude and longitude from `hub_id`, fetches the next week's weather forecast from PirateWeather API, and stores the raw data in the datalake. The backend validates `hub_id`.
      parameters:
      - name: hub_id
        in: path
        description: Unique identifier for the supply chain hub.
        required: true
        style: simple
        explode: false
        schema:
          type: string
        example: H001
      responses:
        "200":
          description: Weather forecast was fetched and stored successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponse"
        "400":
          description: Invalid hub_id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Missing data bucket configuration or PirateWeather API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /ese/v1/retrieve/raw/weather/{hub_id}:
    get:
      tags:
      - Data retrieval microservice
      summary: Retrieve raw Pirate Weather payload for a hub and date
      description: |
        Reads raw weather data from the datalake for the specified hub and date. The backend validates both `hub_id` and the `DD-MM-YYYY` date format.
      parameters:
      - name: hub_id
        in: path
        description: Unique identifier for the supply chain hub.
        required: true
        style: simple
        explode: false
        schema:
          type: string
        example: H001
      - name: date
        in: query
        description: Target date in `DD-MM-YYYY` format.
        required: true
        style: form
        explode: true
        schema:
          pattern: "^\\d{2}-\\d{2}-\\d{4}$"
          type: string
        example: 08-03-2026
      responses:
        "200":
          description: Raw PirateWeather JSON response for the requested date.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveRawWeatherResponse"
        "400":
          description: Invalid hub_id or missing/invalid date.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Raw weather data was not found for the given hub_id and date.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Missing data bucket configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /ese/v1/retrieve/processed/weather/{hub_id}:
    get:
      tags:
      - Data retrieval microservice
      summary: Retrieve processed weather payload for a hub and date
      description: |
        Reads processed weather data from the datalake for the specified hub and date. The backend validates both `hub_id` and the `DD-MM-YYYY` date format.
      parameters:
      - name: hub_id
        in: path
        description: Unique identifier for the supply chain hub.
        required: true
        style: simple
        explode: false
        schema:
          type: string
        example: H001
      - name: date
        in: query
        description: Target date in `DD-MM-YYYY` format.
        required: true
        style: form
        explode: true
        schema:
          pattern: "^\\d{2}-\\d{2}-\\d{4}$"
          type: string
        example: 08-03-2026
      responses:
        "200":
          description: Processed weather data in the ML model input schema.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrieveProcessedWeatherResponse"
        "400":
          description: Invalid hub ID or missing/invalid date. `date` must be `DD-MM-YYYY`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Processed weather data was not found for the given hub and
            date.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Missing data bucket configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /ese/v1/process/weather:
    post:
      tags:
      - Data processing microservice
      summary: Process raw weather data into 6-hour forecast objects
      description: |
        Processes raw weather data using the ML model input schema for a given date by extracting hourly forecast entries for the next 7 days. Existing processed objects for the same date are overwritten. Request-body validation is handled by the backend service.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessWeatherRequest"
        required: true
      responses:
        "200":
          description: Processed weather objects created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessWeatherResponse"
        "400":
          description: Raw data not provided or not in the correct format.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Missing data bucket configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /ese/v1/risk/location/{hub_id}:
    get:
      tags:
      - Analytics microservice
      summary: Retrieve the latest risk analysis for a hub
      description: |
        Returns the recent risk score breakdown for the specified hub and date. If no date is provided, returns the risk analysis for  The backend validates `hub_id`.
      parameters:
      - name: hub_id
        in: path
        description: Unique identifier for the supply chain hub.
        required: true
        style: simple
        explode: false
        schema:
          type: string
        example: H001
      - name: date
        in: query
        description: Target date in `DD-MM-YYYY` format.
        required: false
        style: form
        explode: true
        schema:
          pattern: "^\\d{2}-\\d{2}-\\d{4}$"
          type: string
        example: 08-03-2026
      responses:
        "200":
          description: Latest risk score for the hub_id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskLocationResponse"
        "400":
          description: "Invalid hub_id or date format, incorrect processed data format."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Processed data for hub_id not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
